<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>카테고리 등록</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>.field-error { color: #dc3545; font-size: 0.9em; }</style>
</head>
<body class="container mt-5">

    <div class="row justify-content-center">
        <div class="col-md-6">
            <h2 class="mb-4">새 카테고리 등록</h2>
            
            <form th:action="@{/categories/create}" th:object="${categoryForm}" method="post" class="card card-body shadow-sm">
                <div class="mb-3">
                    <label th:for="name" class="form-label">카테고리 이름</label>
                    <input type="text" th:field="*{name}" class="form-control" 
                           th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'" placeholder="이름을 입력하세요">
                    <div class="field-error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}">Incorrect data</div>
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-success">등록하기</button>
                    <a th:href="@{/categories}" class="btn btn-outline-secondary">취소</a>
                </div>
            </form>
        </div>
    </div>

    <footer style="margin-top: 50px; padding: 20px; background-color: #f8f9fa; border-top: 1px solid #dee2e6;">
        <p th:text="${'실습 수행 일시: ' + #temporals.format(#temporals.createNow(), 'yyyy년 MM월 dd일 (E) a hh:mm:ss') + ' | 학번: 2191276 | 성명: 이재혁'}"></p>
    </footer>

</body>
</html>
