<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>카테고리 관리</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>카테고리 목록</h2>
        <a th:href="@{/categories/create}" class="btn btn-primary">새 카테고리 등록</a>
    </div>

    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

    <table class="table table-striped border">
        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>카테고리명</th>
                <th>관리</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="category : ${categories}">
                <td th:text="${category.id}">1</td>
                <td th:text="${category.name}">전자제품</td>
                <td>
                    <form th:action="@{/categories/{id}/delete(id=${category.id})}" method="post" 
                          onsubmit="return confirm('정말 삭제하시겠습니까?');" style="display:inline;">
                        <button type="submit" class="btn btn-danger btn-sm">삭제</button>
                    </form>
                </td>
            </tr>
        </tbody>
    </table>

    <div class="mt-3">
        <a th:href="@{/products}" class="btn btn-secondary">상품 목록으로 돌아가기</a>
    </div>

    <footer style="margin-top: 50px; padding: 20px; background-color: #f8f9fa; border-top: 1px solid #dee2e6;">
        <p th:text="${'실습 수행 일시: ' + #temporals.format(#temporals.createNow(), 'yyyy년 MM월 dd일 (E) a hh:mm:ss') + ' | 학번: 2191276 | 성명: 이재혁'}"></p>
    </footer>

</body>
</html>
